<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" height="320">
  <style>
    .logo-bg { fill: #020817; }
    .hex-stroke { fill: none; stroke: #63b3ed; stroke-width: 1.5; }
    .hex-fill { fill: #0f172a; }
    .inner-stroke { fill: none; stroke: #7c3aed; stroke-width: 1; opacity: 0.6; }
    .em-path { fill: none; stroke: #63b3ed; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .dot { fill: #63b3ed; }
    .dot-purple { fill: #7c3aed; }
    .name-first { font-family: 'Courier New', monospace; font-size: 38px; font-weight: 700; fill: #f8fafc; letter-spacing: 2px; }
    .name-last  { font-family: 'Courier New', monospace; font-size: 38px; font-weight: 700; fill: #63b3ed; letter-spacing: 2px; }
    .tagline    { font-family: 'Courier New', monospace; font-size: 12px; fill: #475569; letter-spacing: 4px; }
    .divider    { stroke: #1e293b; stroke-width: 1; }
    .bracket    { fill: none; stroke: #1e3a5f; stroke-width: 1.2; }
  </style>

  <rect x="20" y="20" width="640" height="280" rx="16" class="logo-bg"/>

  <!-- corner accents -->
  <rect x="20" y="20" width="18" height="2" fill="#63b3ed" opacity="0.6"/>
  <rect x="20" y="20" width="2" height="18" fill="#63b3ed" opacity="0.6"/>
  <rect x="642" y="20" width="18" height="2" fill="#63b3ed" opacity="0.6"/>
  <rect x="658" y="20" width="2" height="18" fill="#63b3ed" opacity="0.6"/>
  <rect x="20" y="298" width="18" height="2" fill="#63b3ed" opacity="0.6"/>
  <rect x="20" y="280" width="2" height="18" fill="#63b3ed" opacity="0.6"/>
  <rect x="642" y="298" width="18" height="2" fill="#63b3ed" opacity="0.6"/>
  <rect x="658" y="280" width="2" height="18" fill="#63b3ed" opacity="0.6"/>

  <!-- hexagon mark -->
  <polygon points="130,70 196,108 196,184 130,222 64,184 64,108" class="hex-fill"/>
  <polygon points="130,70 196,108 196,184 130,222 64,184 64,108" class="hex-stroke"/>
  <polygon points="130,86 180,115 180,173 130,202 80,173 80,115" class="inner-stroke"/>

  <!-- E -->
  <line x1="96" y1="126" x2="96" y2="194" class="em-path"/>
  <line x1="96" y1="126" x2="120" y2="126" class="em-path"/>
  <line x1="96" y1="160" x2="116" y2="160" class="em-path"/>
  <line x1="96" y1="194" x2="120" y2="194" class="em-path"/>

  <!-- M -->
  <line x1="128" y1="194" x2="128" y2="126" class="em-path"/>
  <line x1="128" y1="126" x2="148" y2="155" class="em-path"/>
  <line x1="148" y1="155" x2="166" y2="126" class="em-path"/>
  <line x1="166" y1="126" x2="166" y2="194" class="em-path"/>

  <!-- vertex dots -->
  <circle cx="130" cy="70"  r="3" class="dot"/>
  <circle cx="196" cy="108" r="3" class="dot-purple"/>
  <circle cx="196" cy="184" r="3" class="dot"/>
  <circle cx="130" cy="222" r="3" class="dot-purple"/>
  <circle cx="64"  cy="184" r="3" class="dot"/>
  <circle cx="64"  cy="108" r="3" class="dot-purple"/>

  <!-- divider -->
  <line x1="228" y1="80" x2="228" y2="240" class="divider"/>

  <!-- name -->
  <text x="255" y="148" class="name-first">EPHANTUS</text>
  <text x="255" y="196" class="name-last">MACHARIA</text>
  <text x="256" y="228" class="tagline">WEB · AUTOMATION · LINUX · DOCS</text>

  <polyline points="248,118 240,118 240,238 248,238" class="bracket"/>
</svg>
